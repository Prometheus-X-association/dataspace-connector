services:
  dataspace-connector:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        ENV: ${NODE_ENV}
    restart: unless-stopped
    tty: true
    volumes:
      - './src/:/usr/src/app/src'
    environment:
      MONGO_URI: ${MONGO_URI}
      NAME: ${NAME}
      DNS: ${DNS}
      PORT: ${PORT}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      - "traefik.http.routers.${NAME}.rule=Host(`${DNS}`)"
      - "traefik.http.routers.${NAME}.entrypoints=websecure"
      - "traefik.http.routers.${NAME}.tls.certresolver=letsEncrypt"

      - "traefik.http.services.${NAME}.loadbalancer.server.port=${PORT}"
    networks:
      - web
      - internal

  mongodb:
    build:
      context: .
      dockerfile: docker/mongodb/Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data/db
    networks:
      - internal

  # PDC Dashboard - Web interface accessible at https://${DNS}/dashboard
  pdc-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      - "traefik.http.routers.${NAME}-dashboard.rule=Host(`${DNS}`) && PathPrefix(`/dashboard`)"
      - "traefik.http.routers.${NAME}-dashboard.entrypoints=websecure"
      - "traefik.http.routers.${NAME}-dashboard.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.${NAME}-dashboard.priority=100"

      - "traefik.http.middlewares.${NAME}-dashboard-strip.stripprefix.prefixes=/dashboard"
      - "traefik.http.routers.${NAME}-dashboard.middlewares=${NAME}-dashboard-strip"

      - "traefik.http.services.${NAME}-dashboard.loadbalancer.server.port=80"
    networks:
      - web
      - internal

networks:
  web:
    external: true
  internal:
    driver: bridge
