services:
  # Nginx reverse proxy - Single entry point
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dataspace-connector
      - pdc-dashboard
    networks:
      - internal

  dataspace-connector:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        ENV: ${NODE_ENV}
    restart: unless-stopped
    tty: true
    volumes:
      - './src/:/usr/src/app/src'
    environment:
      MONGO_URI: ${MONGO_URI}
      NAME: ${NAME}
      DNS: ${DNS}
      PORT: ${PORT}
    depends_on:
      - mongodb
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      - "traefik.http.routers.${NAME}.rule=Host(`${DNS}`)"
      - "traefik.http.routers.${NAME}.entrypoints=websecure"
      - "traefik.http.routers.${NAME}.tls.certresolver=letsEncrypt"

      - "traefik.http.services.${NAME}.loadbalancer.server.port=${PORT}"
    networks:
      - internal

  mongodb:
    build:
      context: .
      dockerfile: docker/mongodb/Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data/db
    networks:
      - internal

  # PDC Dashboard - Accessible at http://localhost:3000/dashboard/
  pdc-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

networks:
  web:
    external: true
  internal:
    driver: bridge
